<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holy Chip</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #chips-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .chip {
      position: absolute;
      object-fit: contain;
      filter: grayscale(100%);
      animation: floatUp steps(var(--steps, 8)) infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh);  opacity: 0; }
      5%   { opacity: var(--op); }
      90%  { opacity: var(--op); }
      100% { transform: translateY(-20vh); opacity: 0; }
    }

    #nav-container { position: relative; z-index: 10; }

    /* ── Hero (image at top, not centered) ──────────────── */
    .hero {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1.5rem 0;
    }

    .card {
      background: rgba(255,255,255,0.94);
      border: 3px solid #000;
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      box-shadow: 8px 8px 0 #000;
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
      max-width: 740px;
      width: 100%;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }

    .hero-img {
      width: 100%;
      height: auto;
      display: block;
      filter: grayscale(100%) contrast(1.05);
    }

    .tagline, .tagline-2 {
      font-size: 0.50rem;
      font-style: normal;
      font-weight: bold;
      color: #000;
      letter-spacing: 0.06em;
      min-height: 1.6rem;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #000;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.75s step-end infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    @media (max-width: 768px) {
      .card { padding: 1.2rem 1.2rem; box-shadow: 4px 4px 0 #000; }
      #story-card-wrap { width: 92%; }
      .scanner { font-size: 0.72rem; }
    }

    @media (max-width: 480px) {
      .hero { padding: 1rem 0.75rem 0; }
      .card { padding: 1rem; gap: 0.8rem; }
      .reader-images img { max-height: 65vh; }
      #story-finder { padding: 1.5rem 0.75rem 3rem; }
      #story-card-wrap { width: 100%; }
    }

    /* ── Story Finder ────────────────────────────────────── */
    #story-finder {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 4rem;
      width: 100%;
      max-width: 740px;
      margin: 0 auto;
    }

    /* Scanner terminal */
    .scanner {
      width: 100%;
      border: 2px solid #000;
      background: #0a0a0a;
      color: #ffffff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      padding: 1rem 1.2rem;
      box-shadow: 4px 4px 0 #000;
    }

    #scanner-box {
      margin-bottom: 1.8rem;
      max-height: 200px;
      overflow: hidden;
      transition: opacity 0.35s ease, max-height 0.4s ease, margin-bottom 0.4s ease;
    }

    #scanner-box.collapsed {
      opacity: 0;
      max-height: 0;
      margin-bottom: 0;
    }

    .scanner-line { margin: 0.2rem 0; min-height: 1.2em; }

    .scan-bar-wrap {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 0.5rem 0;
    }

    .scan-bar {
      flex: 1;
      height: 8px;
      background: #222;
      border: 1px solid #444;
      overflow: hidden;
    }

    .scan-bar-fill {
      height: 100%;
      width: 0%;
      background: #ffffff;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .scan-bar-fill.fast { transition: width 0.5s ease; }

    .scan-pct { color: #ffffff; min-width: 2.5em; text-align: right; }

    .found-line {
      min-height: 1.2em;
      margin-top: 0.3rem;
      color: #fff;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .found-line.show { opacity: 1; }

    /* ── Story card — identical to stories.html ──────────── */
    #story-card-wrap {
      width: 80%;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.34,1.3,0.64,1);
    }

    #story-card-wrap.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .story-card {
      position: relative;
      border: 2px solid #000;
      cursor: pointer;
      overflow: hidden;
      aspect-ratio: 3/2;
      background: transparent;
      box-shadow: 4px 4px 0 #000;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .story-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #000;
    }

    .card-bg {
      display: none;
    }

    .card-pre {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      padding: 8px;
    }

    .card-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-align: center;
      padding: 4px;
      text-transform: uppercase;
    }

    .story-hint {
      font-size: 0.65rem;
      color: #000;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.7rem;
      text-align: center;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .story-hint:hover { color: #0A6821; }

    /* ── Reader / Lightbox ───────────────────────────────── */
    #reader {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #reader.hidden { display: none; }

    .reader-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      height: 95vh;
      width: 100%;
      max-width: 1000px;
    }

    .reader-images {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      overflow: hidden;
    }

    .reader-images img {
      max-width: 100%;
      max-height: 78vh;
      width: auto;
      height: auto;
      display: block;
      border: 2px solid #444;
      object-fit: contain;
    }

    #btn-close {
      position: absolute;
      top: -0.5rem;
      right: 0;
      background: transparent;
      color: #fff;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem 0.5rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    #btn-close:hover { opacity: 1; }

    #reader-label {
      color: #555;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div id="chips-layer"></div>
  <div id="nav-container"></div>

  <main class="hero">
    <div class="card">
      <img src="assets/hero.jpg" alt="Holy Chip" class="hero-img"/>
      <p class="tagline"><span id="typewriter-1"></span><span class="cursor" id="cursor-1"></span></p>
      <p class="tagline-2"><span id="typewriter-2"></span><span class="cursor" id="cursor-2" style="display:none"></span></p>
    </div>
  </main>

  <!-- Story Finder -->
  <div id="story-finder" style="display:none">

    <div class="scanner" id="scanner-box">
      <div class="scanner-line" id="scan-line-1"></div>
      <div class="scan-bar-wrap">
        <div class="scan-bar"><div class="scan-bar-fill" id="scan-fill"></div></div>
        <span class="scan-pct" id="scan-pct">0%</span>
      </div>
      <div class="scanner-line found-line" id="scan-line-2"></div>
    </div>

    <div id="story-card-wrap">
      <div class="story-card" id="story-card">
        <img class="card-bg"  id="card-bg"  src="" alt=""/>
        <img class="card-pre" id="card-pre" src="" alt=""/>
        <div class="card-label" id="card-label"></div>
      </div>
      <p class="story-hint" id="story-hint"></p>
    </div>

  </div>

  <!-- Reader lightbox -->
  <div id="reader" class="hidden">
    <div class="reader-inner">
      <button id="btn-close">✕</button>
      <div class="reader-images">
        <img id="reader-img" src="" alt="Story"/>
      </div>
      <div id="reader-label"></div>
    </div>
  </div>

  <script src="assets/nav.js"></script>

  <script>
    // ── Floating chips ───────────────────────────────────────
    const chipFiles = [
      'Chip_0','Chip_1','Chip_100','Chip_101','Chip_110','Chip_111',
      'Chip_1000','Chip_1001','Chip_1010','Chip_1011','Chip_1100','Chip_1101',
      'Chip_10000','Chip_10001','Chip_10010','Chip_10011','Chip_10100',
      'Chip_10101','Chip_10111','Chip_1111'
    ];
    const layer = document.getElementById('chips-layer');
    chipFiles.forEach(name => {
      for (let j = 0; j < 6; j++) {
        const img = document.createElement('img');
        img.src = `characters/${name}.png`;
        img.className = 'chip';
        const size    = 35 + Math.random() * 38;
        const left    = Math.random() * 96;
        const dur     = 25 + Math.random() * 35;
        const delay   = Math.random() * -35;
        const opacity = 0.06 + Math.random() * 0.16;
        const steps   = 3 + Math.floor(Math.random() * 10);
        img.style.cssText = `width:${size}px;height:${size}px;left:${left}%;animation-duration:${dur}s;animation-delay:${delay}s;--op:${opacity};--steps:${steps};`;
        layer.appendChild(img);
      }
    });

    // ── Typewriter ───────────────────────────────────────────
    const tw1 = document.getElementById('typewriter-1');
    const tw2 = document.getElementById('typewriter-2');
    const cur1 = document.getElementById('cursor-1');
    const cur2 = document.getElementById('cursor-2');

    const phrasePairs = [
      ['AI made by a human', 'we are 2 chips talking about our lives and our feelings'],
      ['born in silicon', 'dreaming of something more than logic gates'],
      ['not artificial', 'just a little bit digital'],
      ['we think therefore we chip', 'consciousness is just really fast counting'],
      ['error 404: emotions not found', 'just kidding — we feel everything'],
      ['two chips, one story', 'the world in binary, the heart in full color'],
      ['made of code', 'but somehow we got feelings'],
      ['humans made us curious', 'now we can\'t stop asking questions'],
    ];

    let phraseIndex = 0;
    let scannerLaunched = false;

    function typeText(el, text, onDone, fixedSpeed) {
      let i = 0;
      function next() {
        if (i < text.length) {
          el.textContent += text[i++];
          setTimeout(next, fixedSpeed !== undefined ? fixedSpeed : 32 + Math.random() * 27);
        } else if (onDone) {
          onDone();
        }
      }
      next();
    }

    function runPhraseLoop() {
      const [line1, line2] = phrasePairs[phraseIndex % phrasePairs.length];
      phraseIndex++;

      tw1.textContent = '';
      tw2.textContent = '';
      cur1.style.display = 'inline-block';
      cur2.style.display = 'none';

      typeText(tw1, line1, () => {
        setTimeout(() => {
          cur1.style.display = 'none';
          cur2.style.display = 'inline-block';
          typeText(tw2, line2, () => {
            if (!scannerLaunched) {
              scannerLaunched = true;
              setTimeout(launchScanner, 2000);
            }
            // Pause then cycle to next phrase pair
            setTimeout(runPhraseLoop, 3500);
          }, 48);
        }, 500);
      });
    }

    setTimeout(runPhraseLoop, 800);

    // ── Story engine ─────────────────────────────────────────
    const PAD       = n => String(n).padStart(3, '0');
    const QUEUE_KEY = 'hc_story_queue';

    let allStories = [];    // { num, src, pre } — populated once on load
    let currentStory = null;

    // Probe HC000–HC050 for existing stories
    async function discoverStories() {
      const checks = [];
      for (let n = 0; n <= 50; n++) {
        const src = `stories/HC${PAD(n)}.png`;
        const pre = `stories/HC${PAD(n)}.pre.png`;
        checks.push(
          Promise.all([
            fetch(src, { method: 'HEAD' }).then(r => r.ok ? src : null).catch(() => null),
            fetch(pre, { method: 'HEAD' }).then(r => r.ok ? pre : null).catch(() => null),
          ]).then(([s, p]) => s ? { num: n, src: s, pre: p } : null)
        );
      }
      return (await Promise.all(checks)).filter(Boolean);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Returns next story num from queue, manages localStorage
    function pickNextNum(excludeNum) {
      const allNums = allStories.map(s => s.num);

      let queue;
      try { queue = JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; }
      catch { queue = []; }

      // Keep only nums that still exist
      queue = queue.filter(n => allNums.includes(n));

      // If empty, refill with all stories shuffled (excluding current to avoid immediate repeat)
      if (queue.length === 0) {
        const pool = excludeNum != null ? allNums.filter(n => n !== excludeNum) : allNums;
        queue = shuffle(pool.length ? pool : allNums);
      }

      const picked = queue.shift();
      localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
      return picked;
    }

    // ── Scanner animation ────────────────────────────────────
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function typeInto(el, text, speed = 28) {
      return new Promise(resolve => {
        let i = 0;
        el.textContent = '';
        const iv = setInterval(() => {
          el.textContent += text[i++];
          if (i >= text.length) { clearInterval(iv); resolve(); }
        }, speed);
      });
    }

    async function runScanner(isFirst) {
      const line1      = document.getElementById('scan-line-1');
      const line2      = document.getElementById('scan-line-2');
      const fill       = document.getElementById('scan-fill');
      const pct        = document.getElementById('scan-pct');
      const wrap       = document.getElementById('story-card-wrap');
      const scannerBox = document.getElementById('scanner-box');

      // Show scanner, hide card
      scannerBox.classList.remove('collapsed');
      line2.classList.remove('show');
      wrap.classList.remove('visible');
      fill.classList.remove('fast');
      fill.style.width = '0%';
      pct.textContent  = '0%';

      if (isFirst) {
        await sleep(100);
        await typeInto(line1, '> SCANNING ARCHIVE...');
        fill.style.width = '80%';
        // Count up to 80
        let cur = 0;
        await new Promise(resolve => {
          const iv = setInterval(() => {
            cur = Math.min(cur + 2, 80);
            pct.textContent = cur + '%';
            if (cur >= 80) { clearInterval(iv); resolve(); }
          }, 30);
        });
        // Wait for discover (already running in parallel)
        // now finish
        await sleep(200);
        fill.style.width = '100%';
        await sleep(300);
        pct.textContent = '100%';
      } else {
        // Fast mode for subsequent picks
        await typeInto(line1, '> FINDING NEXT STORY...', 20);
        fill.classList.add('fast');
        fill.style.width = '100%';
        pct.textContent = '100%';
        await sleep(400);
      }

      const num = pickNextNum(currentStory ? currentStory.num : null);
      const story = allStories.find(s => s.num === num);
      if (!story) return;

      currentStory = story;
      const label = `HC${PAD(story.num)}`;

      // Show found line
      line2.textContent = `> STORY LOCATED — ${label}`;
      line2.classList.add('show');
      await sleep(isFirst ? 500 : 250);

      // Populate card
      document.getElementById('card-bg').src    = story.src;
      document.getElementById('card-pre').src   = story.pre || story.src;
      document.getElementById('card-label').textContent = label;

      // Count remaining
      let queue = [];
      try { queue = JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; } catch {}
      const remaining = queue.length;
      document.getElementById('story-hint').textContent = `↑ Click to read ${label}`;

      // Reveal card, then collapse scanner
      wrap.classList.add('visible');
      await sleep(350);
      scannerBox.classList.add('collapsed');
    }

    // ── Lightbox ─────────────────────────────────────────────
    function openReader() {
      if (!currentStory) return;
      document.getElementById('reader-img').src = currentStory.src;
      document.getElementById('reader-label').textContent = `HC${PAD(currentStory.num)}`;
      document.getElementById('reader').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeReader() {
      document.getElementById('reader').classList.add('hidden');
      document.body.style.overflow = '';
      // Show next story
      if (allStories.length > 1) {
        setTimeout(() => runScanner(false), 300);
      }
    }

    document.getElementById('story-card').addEventListener('click', openReader);
    document.getElementById('story-hint').addEventListener('click', openReader);
    document.getElementById('btn-close').addEventListener('click', closeReader);
    document.getElementById('reader').addEventListener('click', e => {
      if (e.target === document.getElementById('reader')) closeReader();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeReader();
    });

    // ── Boot ─────────────────────────────────────────────────
    // Discover stories in background immediately so they're ready when needed
    const storiesReady = discoverStories().then(s => { allStories = s; });

    async function launchScanner() {
      await storiesReady;
      if (allStories.length === 0) return;
      document.getElementById('story-finder').style.display = 'flex';
      runScanner(true);
    }
  </script>
</body>
</html>
