<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holy Chip</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      overflow: hidden;
    }

    #chips-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .chip {
      position: absolute;
      object-fit: contain;
      filter: grayscale(100%);
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);       opacity: 0; }
      5%   { opacity: var(--op); }
      90%  { opacity: var(--op); }
      100% { transform: translateY(-20vh) rotate(var(--rot)); opacity: 0; }
    }

    #nav-container { position: relative; z-index: 10; }

    .hero {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 1.5rem;
    }

    .card {
      background: rgba(255,255,255,0.94);
      border: 3px solid #000;
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      box-shadow: 8px 8px 0 #000;
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
      max-width: 740px;
      width: 100%;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }

    .hero-img {
      width: 100%;
      height: auto;
      display: block;
      filter: grayscale(100%) contrast(1.05);
    }

    .tagline {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      font-style: italic;
      color: #555;
      letter-spacing: 0.06em;
      min-height: 1.6rem;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #000;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.75s step-end infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>

  <div id="chips-layer"></div>
  <div id="nav-container"></div>

  <main class="hero">
    <div class="card">
      <img src="assets/hero.jpg" alt="Holy Chip" class="hero-img"/>
      <p class="tagline"><span id="typewriter"></span><span class="cursor"></span></p>
    </div>
  </main>

  <script src="assets/nav.js"></script>

  <script>
    const chipFiles = [
      'Chip_0','Chip_1','Chip_100','Chip_101','Chip_110','Chip_111',
      'Chip_1000','Chip_1001','Chip_1010','Chip_1011','Chip_1100','Chip_1101',
      'Chip_10000','Chip_10001','Chip_10010','Chip_10011','Chip_10100',
      'Chip_10101','Chip_10111','Chip_1111'
    ];

    const layer = document.getElementById('chips-layer');

    chipFiles.forEach(name => {
      for (let j = 0; j < 6; j++) {
        const img = document.createElement('img');
        img.src = `characters/${name}.png`;
        img.className = 'chip';

        const size    = 35 + Math.random() * 38;
        const left    = Math.random() * 96;
        const dur     = 10 + Math.random() * 20;
        const delay   = Math.random() * -35;
        const opacity = 0.06 + Math.random() * 0.16;
        const rot     = (Math.random() - 0.5) * 50 + 'deg';

        img.style.cssText = `
          width:${size}px;height:${size}px;
          left:${left}%;
          animation-duration:${dur}s;
          animation-delay:${delay}s;
          --op:${opacity};
          --rot:${rot};
        `;
        layer.appendChild(img);
      }
    });

    // Typewriter
    const text = 'AI made by a Human';
    const el   = document.getElementById('typewriter');
    let i = 0;

    function type() {
      if (i < text.length) {
        el.textContent += text[i++];
        setTimeout(type, 70 + Math.random() * 60);
      }
    }
    setTimeout(type, 800);
  </script>
</body>
</html>
