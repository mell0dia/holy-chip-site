<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stories — Holy Chip</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #fff;
      color: #000;
      min-height: 100vh;
    }

    #nav-container { position: relative; z-index: 10; }

    /* ── Page wrapper ──────────────────────────────────── */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .page-header {
      border-bottom: 3px solid #000;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    .page-header h1 {
      font-size: 2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #story-count {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 0.1em;
    }

    /* ── Loading ─────────────────────────────────────────── */
    #loading {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: #aaa;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* ── Grid ────────────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 1.5rem;
    }

    @media (max-width: 768px) {
      .page { padding: 1.5rem 1rem; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    }

    @media (max-width: 480px) {
      .page { padding: 1rem 0.75rem; }
      .page-header h1 { font-size: 1.4rem; }
      #grid { grid-template-columns: 1fr; gap: 0.75rem; }
      .reader-images img { max-height: 65vh; }
    }

    .story-card {
      position: relative;
      border: 2px solid #000;
      cursor: pointer;
      overflow: hidden;
      aspect-ratio: 3/2;
      background: #111;
      box-shadow: 4px 4px 0 #000;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .story-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #000;
    }

    /* Faded background = main story image */
    .card-bg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.25;
      filter: grayscale(100%);
    }

    /* Superposed = pre image, centered */
    .card-pre {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      filter: grayscale(100%);
      padding: 8px;
    }

    /* Story number label */
    .card-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-align: center;
      padding: 4px;
      text-transform: uppercase;
    }

    /* Empty state */
    #empty {
      color: #aaa;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Reader / Lightbox ───────────────────────────────── */
    #reader {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #reader.hidden { display: none; }

    .reader-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      height: 95vh;
      width: 100%;
      max-width: 1000px;
    }

    .reader-images {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      overflow: hidden;
    }

    .reader-images img {
      max-width: 100%;
      max-height: 78vh;
      width: auto;
      height: auto;
      display: block;
      border: 2px solid #444;
      object-fit: contain;
    }

    #btn-close {
      position: absolute;
      top: -0.5rem;
      right: 0;
      background: transparent;
      color: #fff;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem 0.5rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    #btn-close:hover { opacity: 1; }
  </style>
</head>
<body>

  <div id="nav-container"></div>

  <div class="page">
    <div class="page-header">
      <h1>Stories</h1>
      <span id="story-count"></span>
    </div>

    <div id="loading">Scanning stories...</div>
    <div id="empty" style="display:none">No stories found yet.</div>
    <div id="grid"></div>
  </div>

  <!-- Reader -->
  <div id="reader" class="hidden">
    <div class="reader-inner">
      <button id="btn-close">✕</button>
      <div class="reader-images">
        <img id="reader-story" src="" alt="Story"/>
      </div>
      <div style="color:#555;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;" id="reader-label"></div>
    </div>
  </div>

  <script src="assets/nav.js"></script>

  <script>
    const BASE = 'stories/';
    const PAD  = n => String(n).padStart(3, '0');
    let STORIES = [];
    let currentIdx = 0;

    function buildGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      STORIES.forEach((story, idx) => {
        const card = document.createElement('div');
        card.className = 'story-card';
        card.innerHTML = `
          <img class="card-bg"  src="${story.main}" alt=""/>
          ${story.pre ? `<img class="card-pre" src="${story.pre}" alt=""/>` : ''}
          <div class="card-label">HC${PAD(story.num)}</div>
        `;
        card.addEventListener('click', () => openReader(idx));
        grid.appendChild(card);
      });
    }

    // ── Auto-discover HC001 … HC200 ─────────────────────────
    async function discover() {
      const found = [];
      const checks = [];
      for (let n = 1; n <= 200; n++) {
        const main = `${BASE}HC${PAD(n)}.png`;
        const pre  = `${BASE}HC${PAD(n)}.pre.png`;
        checks.push(
          Promise.all([
            fetch(main, { method: 'HEAD' }).then(r => r.ok ? main : null).catch(() => null),
            fetch(pre,  { method: 'HEAD' }).then(r => r.ok ? pre  : null).catch(() => null),
          ]).then(([m, p]) => m ? { num: n, main: m, pre: p } : null)
        );
      }
      const results = await Promise.all(checks);
      results.forEach(r => { if (r) found.push(r); });
      found.sort((a, b) => a.num - b.num);
      return found;
    }

    // ── Boot ────────────────────────────────────────────────
    discover().then(stories => {
      STORIES = stories;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('story-count').textContent =
        STORIES.length + ' stor' + (STORIES.length === 1 ? 'y' : 'ies');
      if (STORIES.length === 0) {
        document.getElementById('empty').style.display = '';
      } else {
        buildGrid();
      }
    });

    // ── Reader ──────────────────────────────────────────────
    function openReader(idx) {
      currentIdx = idx;
      renderReader();
      document.getElementById('reader').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeReader() {
      document.getElementById('reader').classList.add('hidden');
      document.body.style.overflow = '';
    }

    function renderReader() {
      const story = STORIES[currentIdx];
      document.getElementById('reader-story').src = story.main;
      document.getElementById('reader-label').textContent = `HC${PAD(story.num)}`;
    }

    document.getElementById('btn-close').addEventListener('click', closeReader);
    document.getElementById('reader').addEventListener('click', closeReader);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeReader();
    });
  </script>
</body>
</html>
